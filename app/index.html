<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Launch | Dive Writer Pro</title>

  <meta name="description" content="Launch Dive Writer Pro." />

  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/app.css" />

</head>

<body>

  <main class="app-page">

    <section class="app-box">

      <h1 data-i18n="app_title">
        Access Opened
      </h1>

      <p data-i18n="app_subtitle">
        Your AI dive marketing assistant is ready.
      </p>

      <a
        href="#"
        class="launch-button"
        id="launch-button"
        target="_blank"
      >
        Open Dive Writer Pro
      </a>

      <div class="prompt-box">

        <p class="prompt-title" data-i18n="prompt_title">
          Starter Prompt
        </p>

        <textarea id="starter-prompt" readonly>
Write an Instagram post for a dive center promoting a Red Sea liveaboard safari.
        </textarea>

        <button id="copy-prompt-button">
          Copy Prompt
        </button>

      </div>

      <div class="instruction-box">

        <p data-i18n="instruction_1">
          1. Open the AI assistant
        </p>

        <p data-i18n="instruction_2">
          2. Paste the starter prompt
        </p>

        <p data-i18n="instruction_3">
          3. Continue the dialogue naturally
        </p>

      </div>

      <a
        href="#"
        class="telegram-support"
        id="telegram-support"
        target="_blank"
      >
        Telegram Support
      </a>

    </section>

  </main>

  <script src="/product.js"></script>

  <script src="/lang/en.js"></script>
  <script src="/lang/ru.js"></script>
  <script src="/lang/de.js"></script>
  <script src="/lang/lv.js"></script>
  <script src="/lang/fr.js"></script>
  <script src="/lang/it.js"></script>
  <script src="/lang/pl.js"></script>
  <script src="/lang/es.js"></script>
  <script src="/lang/uk.js"></script>

  <script src="/js/detect.js"></script>
  <script src="/js/lang.js"></script>
  <script src="/js/copy.js"></script>
  <script src="/js/pwa.js"></script>

</body>
</html>
