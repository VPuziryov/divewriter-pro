<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Checkout | Dive Writer Pro</title>

  <meta name="description" content="Secure access to Dive Writer Pro." />

  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/go.css" />

</head>

<body>

  <main class="go-page">

    <section class="checkout-box">

      <h1 data-i18n="go_title">
        Dive Writer Pro is Ready
      </h1>

      <p data-i18n="go_subtitle">
        Get instant access and start creating better dive content.
      </p>

      <div class="price-block">
        <span id="product-price">19€</span>
      </div>

      <ul class="features-list">

        <li data-i18n="go_feature_1">
          Instant access to the AI product
        </li>

        <li data-i18n="go_feature_2">
          Ready-to-use starter prompts
        </li>

        <li data-i18n="go_feature_3">
          First result in 1–2 minutes
        </li>

        <li data-i18n="go_feature_4">
          One-time payment · No subscription
        </li>

      </ul>

      <a
        href="#"
        class="stripe-button"
        id="stripe-button"
        data-i18n="go_cta"
      >
        Continue to Secure Payment
      </a>

      <a
        href="#"
        class="usdt-link"
        id="usdt-button"
      >
        Pay with USDT
      </a>

      <p class="trust-note" data-i18n="go_trust">
        Secure payment via Stripe
      </p>

    </section>

  </main>

  <script src="/product.js"></script>

  <script src="/lang/en.js"></script>
  <script src="/lang/ru.js"></script>
  <script src="/lang/de.js"></script>
  <script src="/lang/lv.js"></script>
  <script src="/lang/fr.js"></script>
  <script src="/lang/it.js"></script>
  <script src="/lang/pl.js"></script>
  <script src="/lang/es.js"></script>
  <script src="/lang/uk.js"></script>

  <script src="/js/detect.js"></script>
  <script src="/js/lang.js"></script>
  <script src="/js/payment.js"></script>
  <script src="/js/pixel.js"></script>

</body>
</html>
